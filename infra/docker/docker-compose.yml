services:
  postgres:
    image: postgres:16
    container_name: second-brain-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - second-brain-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20

  migrations:
    image: oven/bun:1.2.5
    working_dir: /app
    volumes:
      - ../..:/app
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ['bun', 'run', 'db:migrate']

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: second-brain-api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_PORT: 3001
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'bun -e "fetch(\"http://localhost:3001/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    container_name: second-brain-worker
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WORKER_PORT: 3002
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'bun -e "fetch(\"http://localhost:3002/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 3s
      retries: 10

  finances-panel:
    build:
      context: ../..
      dockerfile: apps/finances-panel/Dockerfile
    container_name: second-brain-finances-panel
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      FINANCES_PANEL_PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'bun -e "fetch(\"http://localhost:3000\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2.8
    container_name: second-brain-caddy
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
      finances-panel:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80 >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  second-brain-postgres-data:
